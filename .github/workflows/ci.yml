name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    defaults:
      run:
        working-directory: site_desktop_neofi
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: site_desktop_neofi/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site_desktop_neofi
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: site_desktop_neofi/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit
        run: npm audit --audit-level=high

  ci:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - run: echo "CI ok"
