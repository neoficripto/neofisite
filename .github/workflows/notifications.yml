name: Notifications

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            exit 0
          fi

          payload=$(cat <<'JSON'
          {"content":"Status do pipeline: OK"}
          JSON
          )

          if [ "${{ job.status }}" != "success" ]; then
            payload=$(cat <<'JSON'
            {"content":"Status do pipeline: FALHA"}
          JSON
          )
          fi

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"
