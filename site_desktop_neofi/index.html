    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('__redirect');
        if (!redirect) return;
        try {
          var url = decodeURIComponent(redirect);
          params.delete('__redirect');
          var remaining = params.toString();
          window.history.replaceState(null, '', url + (remaining ? (url.indexOf('?') === -1 ? '?' : '&') + remaining : ''));
        } catch (e) {
          params.delete('__redirect');
          window.history.replaceState(null, '', window.location.pathname);
        }
      })();
    </script>
